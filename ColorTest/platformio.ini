[env:nodemcu]
platform = espressif8266
board = nodemcu
framework = arduino
lib_deps = 
	adafruit/Adafruit SSD1331 OLED Driver Library for Arduino@^1.2.0
	adafruit/DHT sensor library@^1.4.6
	jaikulk14/MQGasKit@^1.0.0
